name: 采集 + AI处理 + 导出

on:
  schedule:
    # 每6小时跑一次：UTC 2:00, 8:00, 14:00, 20:00 → 北京时间 10:00, 16:00, 22:00, 04:00
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run collection pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DATABASE_URL: file:./dev.db
        run: npx tsx scripts/run-pipeline.ts

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ prisma/dev.db
          git diff --cached --quiet || git commit -m "auto: 更新数据 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
