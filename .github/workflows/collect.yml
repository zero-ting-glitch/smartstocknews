name: 采集 + AI处理 + 导出

on:
  # schedule:
  #   # 每6小时跑一次：UTC 2:00, 8:00, 14:00, 20:00 → 北京时间 10:00, 16:00, 22:00, 04:00
  #   - cron: '0 2,8,14,20 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Initialize database
        run: npx prisma db push

      - name: Run collection pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.CFG_01 }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DATABASE_URL: file:./dev.db
        run: npx tsx scripts/run-pipeline.ts

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: 更新数据"
          file_pattern: "public/data/ prisma/dev.db"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
